<body>
    
    <form >
        <table border="1">
             <th colspan="4">Registration Form</th>
                <tr>
                    <td>Student name</td>
                    <td>
                        <input type="text" placeholder="First name">
                    </td>
                     <td>
                        <input type="text" placeholder="Middle name">
                    </td>
                     <td>
                        <input type="text" placeholder="last name">
                    </td>
                </tr>
                <tr>
                    <td>Fathers Name</td>
                    <td>
                        <input type="text" placeholder="Enter your father name">
                    </td>
                    <td>
                        Mothers name
                    </td>
                    <td>
                        <input type="text" placeholder="Enter your mother name">
                    </td>
                </tr>
                <tr>
                    <td>Date of birth</td>
                    <td><input type="date"></td>
                    <td>Gender</td>
                    <td>
                     <label >
                        <input type="radio" name="gender" value="male">male
                    </label>
                    <label >
                        <input type="radio" name="gender" value="female">female
                    </label>
                    </td>
                </tr>
                <tr>
                    <td>Category</td>
                    <td>
                     <label >
                        <input type="radio" name="Category" value="Gen">Gen

                    <label >

                    </label>
                    <label >
                        <input type="radio" name="Category" value="SC/ST">SC/ST
                    </label>
                    </td>
                    <td>Handicaped</td>
                    <td>
                     <label >
                        <input type="radio" name="Handicaped" value="yes">yes
                    </label>
                    <label >
                        <input type="radio" name="Handicaped" value="no">no
                    </label>
                    </td>
                
                </tr>
                <tr>
                    <td>Email ID</td>
                   <td>
                     <label >
                        <input type="email" name="email">
                    </label>  
                   </td>
                    <td>Mobile Number</td>
                   <td>
                     <label >
                        <input type="tel" name="tel">
                    </label>  
                   </td>
                </tr>

                <tr>
                    <td>
                        State
                    </td>
                    <td>
                        <select name="state">
                            <option value="">select any state</option>
                            <option value="Maharastra">Maharastra</option>                            
                            <option value="Madhya pradesh">Madhya pradesh</option>
                        </select>
                    </td>
                    <td>
                        City
                    </td>
                    <td>
                        <select name="city">
                            <option value="">select any city</option>
                            <option value="Mumbai">Mumbai</option>                            
                            <option value="bhopal">Bhopal</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        upload photo
                    </td>
                    <td> 
                        <input type="file">
                    </td>
                    <td>
                        upload Signature
                    </td>
                    <td> 
                        <input type="file">
                    </td>
                </tr>
                <tr>
                    <th colspan="4">
                        <input type="submit">
                    </th>
                </tr>

        </table>
        
    </form>
