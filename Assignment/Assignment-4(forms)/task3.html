<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form>
        <h4>Registration form</h4>
        <label for="Firstname">First name:</label>
        <input type="text" id="Firstname" placeholder="Enter First Name" name="Firstname">
        <br>
        <label >
            Last Name:
            <input type="text" name="lastname" placeholder="Enter Last name">
        </label>
        <br>
         <label >
            Email:
            <input type="email" name="email" placeholder="Enter email address">
        </label>
        <br>
        <label >Gender:</label>
        <br>
        <input type="radio" name="gender" value="male">Male
        <br>
        <input type="radio" name="gender" value="female">Female
        <br>
        <input type="radio" name="gender" value="Other">Other
        <br>
        <label for="age">Age:</label>
        <input type="number" name="age" id="age">
        <br>
        <label>Preferences:</label>
        <input type="checkbox" name="Preferences" value="Acrylic" >Acrylic Painting
        <br>
        <input type="checkbox" name="Preferences" value="oil" >Oil Painting
        <br>
        <input type="checkbox" name="Preferences" value="water Color" >Water Color Painting
        <br>
        <label for="occupation">Select occupation</label>
        <select name="occupation" id="occupation">
            <option value="teacher">teacher</option>
            <option value="student">student</option>
        </select>
        <br>
        <label for="bio">Bio:</label>
        <textarea name="bio" id="bio" rows="5"></textarea>
        <br>
        <input type="submit">
    </form>

</body>
</html>
