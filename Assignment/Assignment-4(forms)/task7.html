<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h3>User INput Form</h3>
        <fieldset>
            <legend>Personal Particular</legend>
            <label >
                Name:
                <input type="text" name="name">
            </label>
            <br><br>
            <label >
                Password:
                <input type="password" name="password">
            </label>
            <br><br>
            <label >
                Gender:
                <input type="radio" name="gender" value="male">male
            </label>
            <label >
            <input type="radio" name="gender" value="female">female
            </label>
            <br><br>
            <label >
                Age:
                <input type="number" name="age" placeholder="<1 year old">
            </label>
        </fieldset>

        <fieldset>
            <legend>Languages</legend>
            <label >
            <input type="checkbox" name="languages" value="java">Java
            </label>
            <label >
            <input type="checkbox" name="languages" value="C/C++">c/c++
            </label>
            <label >
            <input type="checkbox" name="languages" value="java">C#
            </label>
        </fieldset>

        <fieldset>
            <legend>Instructions</legend>
            <textarea name="Instructions" rows="5" cols="30" placeholder="Enter you instruction here..."></textarea>
        </fieldset>
    </form>

</body>
</html>
