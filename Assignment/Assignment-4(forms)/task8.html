<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task8</title>
</head>
<body>
    <form>
                <fieldset>

        <h4>Farewell Party Survey Form</h4>
            
        <label >
            Name:
            <input type="text" name="name">
        </label>
        <br><br>
         <label >
            Email:
            <input type="email" name="email">
        </label>
        <br><br>
         <label >
            Age:
            <input type="number" name="age">
        </label>
        <br><br>
         <label >
           Which option best descibes you:
           <select>
            <option value="Student">Student</option>
            <option value="Teacher">Teacher</option>
           </select>
        </label>
        <br><br>
             <label >
          Will you attend the party:
           <select>
            <option value="yes">yes</option>
            <option value="no">no</option>
           </select>
        </label>
        <br><br>
        
        <label  >
            What did you like about the program:
            <input type="checkbox" name="program" value="Training" >Training
            <br>
            <input type="checkbox" name="program" value="the Learning Sessions form industry Experts" >the Learning Sessions form industry Experts
            <br>
            <input type="checkbox" name="program" value="Community Meetups" >Community Meetups
            <br>
            <input type="checkbox" name="program" value="Brown Bag sessions" >Brown Bag sessions
            <br>
            <input type="checkbox" name="program" value="Switching to Hybrid Mode" >Switching to Hybrid Mode
            <br>
            <input type="checkbox" name="program" value="Food, office etc." >Food, office etc.
        </label>
        <br><br>
        <label >
            Any comments or suggestions
            <textarea name="comments" rows="5" cols="30"></textarea>
        </label>

            </fieldset>

    </form>

</body>
</html>
