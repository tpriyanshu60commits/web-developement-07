<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Registration</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #4e73df, #3a5fd0);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row justify-content-center">

    <!-- Login Form -->
    <div class="col-md-4">
      <div class="card p-4 shadow">
        <h4 class="mb-4 fw-bold">Login</h4>

        <form>
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Confirm password">
          </div>

          <div class="d-flex justify-content-between mb-3">
            <div>
              <input type="checkbox"> Remember me
            </div>
            <a href="#" class="small">Forgot password?</a>
          </div>

          <button class="btn btn-primary w-100">Login Now</button>

          <p class="text-center mt-3 small">
            Don't have an account? <a href="#">Signup now</a>
          </p>
        </form>
      </div>
    </div>

    <!-- Registration Form -->
    <div class="col-md-4">
      <div class="card p-4 shadow">
        <h4 class="mb-4 fw-bold">Registration</h4>

        <form>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Enter your name">
          </div>

          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Create a password">
          </div>

          <div class="mb-3">
            <input type="password" class="form-control" placeholder="Confirm password">
          </div>

          <div class="mb-3">
            <input type="checkbox"> I accept all terms & conditions
          </div>

          <button class="btn btn-primary w-100">Register Now</button>

          <p class="text-center mt-3 small">
            Already have an account? <a href="#">Login now</a>
          </p>
        </form>
      </div>
    </div>

  </div>
</div>

</body>
</html>
