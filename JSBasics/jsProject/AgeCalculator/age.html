<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="age.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>


    <div class="w-25 bg-light rounded shadow border mx-auto mt-5 p-3" >
        <h1 class="text-center mb-3">Age calculator</h1>

        <form class="d-flex flex-column gap-4 align-items-center">
            <label for="DOB">Enter your Date of Birth</label>
            <input type="date" name="DOB" id="DOB" class="form-control">
             <label for="CurrentDate">Choose Current Date</label>
            <input type="date" name="CurrentDate" id="CurrentDate" class="form-control">
            <button type="submit" class="btn btn-primary mb-4">Submit</button>
        </form>

        <div class="fw-bold  text-center">
          Your Age is :  <span id="MyAge">XX</span>Years
        </div>

        



    </div>









    <!-- script bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="age.js"></script>
  </body>
</html>
