<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>
<body>

    <form class="border border-2 ">
        <div class="container border border-2 d-flex justify-content-center align-items-center flex-column p-2 gap-2">
            <div class="displayNumber">0</div>

             <div class="displayNumber2">
                <div class="buttons p-2 d-flex flex-row gap-4 justify-content-center">
                    <button class="btn">AC</button>
                    <button class="btn">C</button>
                    <button class="btn">%</button>
                    <button class="btn " id="lastButton">/</button>
                </div>
                 <div class="buttons p-2 d-flex flex-row gap-4 justify-content-center">
                    <button class="btn">7</button>
                    <button class="btn">8</button>
                    <button class="btn">9</button>
                    <button class="btn " id="lastButton">*</button>
                </div>
                 <div class="buttons p-2 d-flex flex-row gap-4 justify-content-center">
                    <button class="btn">4</button>
                    <button class="btn">5</button>
                    <button class="btn">6</button>
                    <button class="btn " id="lastButton">-</button>
                </div>
                 <div class="buttons p-2 d-flex flex-row gap-4 justify-content-center">
                    <button class="btn">1</button>
                    <button class="btn">2</button>
                    <button class="btn">3</button>
                    <button class="btn " id="lastButton">+</button>
                </div>
                 <div class="buttons  p-2 d-flex flex-row gap-3 justify-content-center align-items-center" >
                    <button class="btn">0</button>
                    <button class="btn">.</button>
                    <button class="btn lastRowButton">=</button>
                </div>
             </div>
        </div>
        
    </form>













    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

    <script src="script.js"></script>
</body>
</html>
