<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration From</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.min.css" />
    />
  </head>
  <body>
    <header>
      <div class="bg-primary p-3 text-center">
        <h2 class="text-light ">Institute Registration Form</h2>
      </div>
    </header>

    <main>
      <div class="container my-4 p-5 bg-light rounded border shadow">
        <form id="registrationFrom">
          <section class="bg-white p-3 rounded border mb-3 ">
            <div class="p-2 mt-2">
              <label for="fullName" class="form-label fw-bold">Full Name</label>
              <input
                type="text"
                name="fullName"
                id="fullName"
                class="form-control"
                placeholder="Rahul Kumar"
              />
              <span class="text-danger small" id="fullNameError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="email" class="form-label fw-bold">Email</label>
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                placeholder="rahulkumar@example.com"
              />
              <span class="text-danger small" id="emailError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="phone" class="form-label fw-bold"
                >Mobile Number</label
              >
              <input
                type="number"
                name="phone"
                id="phone"
                class="form-control"
                placeholder="9876543210"
              />
              <span class="text-danger small" id="phoneError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="dob" class="form-label fw-bold">Date of Birth</label>
              <input
                type="date"
                name="dob"
                id="dob"
                class="form-control"
                placeholder="Rahul Kumar"
              />
              <span class="text-danger small" id="dobError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5">
              <label for="gender" class="form-label fw-bold">Gender</label>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="male"
                  value="male"
                  class="form-switch"
                />
                <span>Male</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="female"
                  value="female"
                  class="form-switch"
                />
                <span>Female</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="others"
                  value="others"
                  class="form-switch"
                />
                <span>Others</span>
              </div>
              <span class="text-danger small" id="dobError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="qualification" class="form-label fw-bold"
                >Last Completed Qualification</label
              >
              <select
                name="qualification"
                id="qualification"
                class="form-select"
              >
                <option value="">Select Qualification</option>
                <option value="10">Matriculation</option>
                <option value="12">Intermediate</option>
                <option value="diploma">Diploma</option>
                <option value="UG">Graduation</option>
                <option value="PG">Post Graduation</option>
              </select>
              <span class="text-danger small" id="qualificationError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="marks" class="form-label fw-bold"
                >Percentage/Grade</label
              >
              <input
                type="text"
                name="marks"
                id="marks"
                class="form-control"
                placeholder="90% or A-F"
              />
              <span class="text-danger small" id="marksError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="course" class="form-label fw-bold"
                >Preferred Course</label
              >
              <select name="course" id="course" class="form-select">
                <option value="">Select Course</option>
                <option value="iitJee">IIT-JEE</option>
                <option value="neet">NEET</option>
                <option value="bankingExams">Banking Exams</option>
                <option value="ca/cs">CA/CS</option>
                <option value="upsc">UPSC</option>
              </select>
              <span class="text-danger small" id="courseError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5 align-items-center">
              <label for="timings" class="form-label fw-bold"
                >Batch Timing Preference</label
              >
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="morning"
                  value="morning"
                  class="form-check"
                />
                <span>Morning</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="evening"
                  value="evening"
                  class="form-check"
                />
                <span>Evening</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="afternoon"
                  value="afternoon"
                  class="form-check"
                />
                <span>AfterNoon</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="weekends"
                  value="weekends"
                  class="form-check"
                />
                <span>Weekends</span>
              </div>
              <span class="text-danger small" id="timingsError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border mb-3">
            <div class="p-2 mt-2">
              <label for="address" class="form-label fw-bold">Address</label>
              <textarea
                name="address"
                id="address"
                class="form-control"
                placeholder="123, Main Street"
              ></textarea>
              <span class="text-danger small" id="addressError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="city" class="form-label fw-bold">City</label>
              <input
                type="text"
                name="city"
                id="city"
                class="form-control"
                placeholder="Delhi"
              />
              <span class="text-danger small" id="cityError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="pin" class="form-label fw-bold">Pin Code</label>
              <input
                type="text"
                name="pin"
                id="pin"
                class="form-control"
                placeholder="110001"
              />
              <span class="text-danger small" id="pinError"></span>
            </div>
          </section>

          <div class="d-flex justify-content-between">
            <button type="reset" class="btn btn-secondary">Clear</button>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
