<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body class="bg-dark text-light">
    <header class="bg-primary text-light p-3 text-center">
      <h1>To Do List</h1>
    </header>

    <main>
      <div class="container rounded border shadow my-2 d-flex gap-4 p-3">
        <input
          type="text"
          name="newTask"
          id="newTask"
          placeholder="Add A New Task"
          class="form-control w-75"
        />
        <button
          class="btn btn-primary w-25 d-flex gap-3 align-items-center justify-content-center"
          onclick="addNewTask()"
        >
          <i class="bi bi-plus-circle"></i> Add New Task
        </button>
      </div>

      <div class="container rounded border shadow my-2 p-3 d-none" id="taskDiv">
        <ol id="taskList">
          <!-- <li class="my-3">
            <div class="d-flex align-items-center">
              <span>Task 1</span>
              <button
                class="btn btn-danger ms-4 d-flex gap-3 align-items-center justify-content-center"
              >
                <i class="bi bi-trash"></i>Delete
              </button>
            </div>
          </li> -->
        </ol>
      </div>
    </main>

    <!-- Scripts -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
