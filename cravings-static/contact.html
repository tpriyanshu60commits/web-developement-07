<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
</head>
<body>

    <!-- header -->
    <header class="d-flex justify-content-between align-items-center p-4">
      <div>
        <img
          src="./images/logo-light.png"
          alt="cravings image"
          width="80px"
          class="ms-4"
        />
      </div>
      <div class="d-flex justify-content-between align-items-center gap-2 me-4">
        <button class="navbarLogin border border-0 rounded p-2">Login</button>
        <button class="navbarRegister border border-0 rounded p-2">
          Register
        </button>
      </div>
    </header>


    <!-- form section -->

    <section class="contactFormSection">
       <div class="row">
        <div class="col-lg-4">
             <div class="contactFormContainer border border-5 p-4">
            <h2 class="text-center">Contact Us</h2>
            <p class="text-center">Have a question? We'd love to hear from you.</p>
            <input type="text" placeholder="Enter your full name" class="p-2 rounded form-control mb-3">
            <input type="email" placeholder="Enter your email" class="p-2 rounded form-control mb-3">
        </div>
        </div>
       </div>
    </section>











    <!-- bootstrap link -->
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
