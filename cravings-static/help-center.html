<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
  </head>
  <body>


     <!-- header -->

    <header class="d-flex justify-content-between align-items-center p-4">
      <div>
        <img
          src="./images/logo-light.png"
          alt="cravings image"
          width="80px"
          class="ms-4"
        />
      </div>
      <div class="d-flex justify-content-between align-items-center gap-2 me-4">
        <button class="navbarLogin border border-0 rounded p-2">Login</button>
        <button class="navbarRegister border border-0 rounded p-2">
          Register
        </button>
      </div>
    </header>

    <!-- form section -->

    <section class="helpSection">
        <div class="helpContainer">
            <div class="d-flex justify-content-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-question-circle-fill text-danger" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M5.496 6.033h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286a.237.237 0 0 0 .241.247m2.325 6.443c.61 0 1.029-.394 1.029-.927 0-.552-.42-.94-1.029-.94-.584 0-1.009.388-1.009.94 0 .533.425.927 1.01.927z"/></svg>
                <h4>Help Center</h4>
            </div>  
            <p class="text-center">Browse FAQs or submit a support ticket below.</p> 

            <div class="row">
                <div class="col-lg-8 ">
                    <div class="row">
                        <div class="col-lg-6 border border-5 p-5">
                            <p class="fw-medium fs-5 mb-3 text-light">Frequently Asked Questions</p>

                            <!-- option -1 -->
                            <div class=" d-flex w-100 justify-content-between align-items-center mb-2 px-2 border border-light p-1 rounded bg-transparent">
                                <div class="d-flex gap-1 align-items-center">
                                    <i class="bi bi-bag-fill text-light"></i> 
                                    <p class="m-1 text-light bg-transparent fw-medium">How do I track my order?</p>   
                                </div>
                                <i class="bi bi-plus-lg me-1 text-light"></i>
                            </div>

                             <!-- option -2 -->
                            <div class=" d-flex w-100 justify-content-between align-items-center mb-2 px-2 border border-light p-1 rounded bg-transparent">
                                <div class="d-flex gap-1 align-items-center">
                                    <i class="bi bi-credit-card-fill text-light"></i>
                                    <p class="m-1 text-light bg-transparent fw-medium">How do I get a refund?</p>   
                                </div>
                                <i class="bi bi-plus-lg me-1 text-light"></i>
                            </div>

                             <!-- option -3 -->
                            <div class=" d-flex w-100 justify-content-between align-items-center mb-2 px-2 border border-light p-1 rounded bg-transparent">
                                <div class="d-flex gap-1 align-items-center">
                                    <i class="bi bi-bicycle text-light"></i>
                                    <p class="m-1 text-light bg-transparent fw-medium">My ride is late. What do i do?</p>   
                                </div>
                                <i class="bi bi-plus-lg me-1 text-light"></i>
                            </div>
                             <!-- option -4 -->
                            <div class=" d-flex w-100 justify-content-between align-items-center mb-2 px-2 border border-light p-1 rounded bg-transparent">
                                <div class="d-flex gap-1 align-items-center">
                                    <i class="bi bi-person-fill text-light"></i>
                                    <p class="m-1 text-light bg-transparent fw-medium">How do I update my contact info?</p>   
                                </div>
                                <i class="bi bi-plus-lg me-1 text-light"></i>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- bootstrap link -->
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
