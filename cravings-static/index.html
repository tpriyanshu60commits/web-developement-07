<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
</head>
<body>

    <!-- header -->
    <div class="row">
        <div class="col-md-12">
           <header class=" d-flex justify-content-between align-items-center p-4" >
             <div>
                <img src="./images/logo-light.png" alt="cravings image" width="80px" class="ms-4">
            </div>
            <div class="d-flex justify-content-between align-items-center gap-2 me-4">
                <button class="navbarLogin border border-0 rounded p-2">Login</button>
                <button class="navbarRegister border border-0 rounded p-2 ">Register</button>
            </div>
           </header>
        </div>
    </div>



    <!-- hero Section -->

    <section class="heroSection d-flex flex-column justify-content-center align-items-center text-center">
        <div class="heroContainer p-4 w-50">
            <div>
            <h1 class=" display-4 fw-bolder">Your Favorite Food,<br>Delivered Fast</h1>
            <p class="mt-3">Order from thousands of restaurants and get it delivered to your doorstep</p>
        </div>
        <div class="d-flex justify-content-center align-items-center gap-4 ">
            <button class="heroSignup border border-0 rounded p-3 px-4">Sign up</button>
            <button class="heroOrrdernow border border-0 rounded p-3 px-4">Order Now</button>
        </div>
        <div class="searchBar w-100"> 
            <div class="input-group mt-4 rounded ">
                <span class="input-group-text bg-white border-0">
                <i class="bi bi-search"></i>
                </span>
                <input class=" border-0 p-2 form-control" type="text" placeholder="Search Restaurents or dishes...">
            </div>
        </div>
        </div>
    </section>


























    <!-- bootstrap link -->
<script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
