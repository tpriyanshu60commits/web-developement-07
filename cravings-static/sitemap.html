<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
</head>
<body>

     <!-- header -->
    <header class="d-flex justify-content-between align-items-center p-4">
      <div>
        <img
          src="./images/logo-light.png"
          alt="cravings image"
          width="80px"
          class="ms-4"
        />
      </div>
      <div class="d-flex justify-content-between align-items-center gap-2 me-4">
        <button class="navbarLogin border border-0 rounded p-2">Login</button>
        <button class="navbarRegister border border-0 rounded p-2">
          Register
        </button>
      </div>
    </header>



     <!-- SiteMap section -->
    <section class="siteMapSection p-4">
      <div class="row d-flex justify-content-center align-items-center">
        <div class="col-lg-5 col-md-6 col-sm-10">
          <div class="siteMapContainer p-4">
            <span class="d-flex justify-content-center align-items-center">
              <i class="bi bi-file-earmark-ruled text-danger fs-1 mb-2"></i>
            </span>
            <div class="d-flex gap-3 justify-content-center align-items-center">
              <h1 class="fw-bold text-light display-5">Site</h1>
              <h1 class="siteMapHeading fw-bold display-5">Map</h1>
            </div>
            <p class="text-center mb-1 text-light opacity-75">
              Please read these terms carefully before using the Cravings
              platform.
            </p>
            <p
              class="siteMapParagraph text-center p-0 mt-2 opacity-50 text-light"
            >
              Last updated: April 9, 2026
            </p>
          </div>
        </div>
      </div>
    </section>










    <!-- bootstrap link -->
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
