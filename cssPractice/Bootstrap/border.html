<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
</head>
<body>

    <!-- Border Sides -->
    <div class="border p-3 mt-4">content</div>
    <br>
    <div class=" border-top  p-2">Border top</div>
    <br>    
    <div class="border-bottom">border bottom</div>
    <br>
    <div class="border-start">border bottom</div>
    <br>
    <div class="border-end ">border end</div>
    <br>

    <!-- border colors and thickness -->

    <div class="border border-danger border-3 mb-3">border</div>
    <br>
    <div class="border border-success border-3 p-3 mb-3">Green Border</div>
    <div class="border-top border-danger border-3 mt-5">border-top , border-bottom</div>



    <br><br>

     <h3>Bootstrap Border Examples</h3>
     <div class="row">
        <div class="col-md-4 border">border</div>

        <div class="col-md-4">
            <div class="border-end">border-top , border-bottom</div>
        </div>
        <div class="col-md-4 border-top border-danger border-3">border-top , border-bottom</div>
        <div class="col-md-4 border-start border-primary border-3">border-start</div>

     </div>    



     <!-- border rounded -->

     <br>
     <div class="rounded bg-primary w-25 rounded-5 p-5 rounded-pill">content</div>
     <br>

     <!-- shadow -->
     <div class="bg-info w-25 p-3 mb-2 shadow-lg">shadow</div>
     <div class="bg-info w-25 p-3 mb-2 shadow-sm">shadow</div>
     <div class="bg-info w-25 p-3 mb-2 shadow-lg">shadow</div>






























     <!-- Bootstrap link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
