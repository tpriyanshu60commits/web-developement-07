<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>

    <!-- text-color -->
    <p class="text-success">hello</p>

    <!-- backgroundColor -->

    <div class="bg-danger text-dark p-3">hello</div>
    <br>
    <!-- button -->
    <button class="btn btn-dark bg-gradient">submit</button>
    <br>

    <!-- width Control -->

    <div class="w-75 bg-primary">hello</div>

    <!-- opacity -->

    <div class="bg-info bg-opacity-75 text-danger text-opacity-50 p-2">this is for the opacity</div>
    <br>

    <!-- gradient -->

    <div class="p-2 bg-danger bg-gradient mb-3">this is for gradient</div>

        <br>
    <!-- backgroundColor combinations -->

    <div class="p-2 mb-1 w-50 text-light bg-danger">colors</div>
    <div class="p-2 mb-1 w-50 text-danger bg-info">hi</div>
    <br>
    
     <!-- Opacity + Gradient -->

     <div class="p-4 mb-3 bg-primary bg-gradient text-white rounded-5 border border-danger border-5 text-center"> <strong> A smooth, subtle fade from light to dark blue.</strong></div>












    
    <!-- Bootstrap link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
