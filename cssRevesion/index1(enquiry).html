<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style1.css" />
  </head>
  <body>
    <header class="header">
      <div class="left">
        <img src="../cssPractice/logo-2 (1).png" alt="ricr image" />
        <nav>
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Courses</a>
          <a href="#">IDE</a>
          <a href="#">Contact Us</a>
        </nav>
      </div>
      <div class="right">
        <a href="#">+91 8889991736</a>
        <button>Student Login</button>
      </div>
    </header>

    <section class="formSection">
      <form class="formContainer">
        <h2>Enquiry Form</h2>
        <p>
          Have questions or need assistance? Fill out the form below to connect
          with our team and explore your opportunities.
        </p>
        <div class="row">
          <div>
            <label>Person Name*</label>
            <input type="text" placeholder="Person name" />
          </div>
          <div>
            <label>Contact Number*</label>
            <input type="number" placeholder="Contact Number" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Email*</label>
            <input type="email" placeholder="Email" />
          </div>
          <div>
            <label>Qualification*</label>
            <input type="text" placeholder="Qualification" />
          </div>
        </div>

        <div class="row1">
          <div>
            <label>College/School Name*</label>
            <input class="CollegeSchoolName" type="email" placeholder="College/School Name" />
          </div>
        </div>

        <div class="row">
          <div>
            <label>Year*</label>
            <select>
              <option>Year</option>
              <option>First Year</option>
              <option>Second Year</option>
              <option>Third Year</option>
              <option>Fourth Year</option>
            </select>
          </div>
          <div>
            <label>Branch*</label>
            <input type="text" placeholder="Branch" />
          </div>
        </div>

        <div class="row">
          <div class="left">
             <label>Interested in Which Course*</label>
            <br />
            <label
              ><input type="checkbox" class="option" /> Full Stack Web
              Development</label
            >
            <label
              ><input type="checkbox" class="option" /> Data Science with Python
              - Placement Oriented</label
            >
            <label
              ><input type="checkbox" class="option" /> Data Analytics with
              Python - Placement Oriented</label
            >
            <label
              ><input type="checkbox" class="option" /> Business Analyst</label
            >
            <label
              ><input type="checkbox" class="option" /> Java Programming</label
            >
            <label
              ><input type="checkbox" class="option" /> Python Programming</label
            >
            <label
              ><input type="checkbox" class="option" /> C/C++ Programming</label
            >
            <label><input type="checkbox" class="option" /> Other</label>
          </div>
          <div class="right">
            <label>Source of Information 
              <br>(Only choose 'Received call from institute'
              if you actually got a call from us)*</label>
            <select>
              <option>Newspaper/Print media</option>
              <option>Friends relative</option>
              <option>Social Media</option>
              <option>Workshop Seminar</option>
            </select>
            <label>Name of Executive*</label>
             <select>
             <option >Name of Executive</option>
            </select>
          </div>
        </div>
      </form>
    </section>
  </body>
</html>
