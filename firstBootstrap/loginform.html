<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-primary">
    <div
      class="d-flex align-items-center justify-content-center vh-100 gap-5 pb-5"
    >
      <!-- login -->
      <div
        class="bg-light d-grid gap-4 p-4 align-items-center justify-content-center rounded-3 w-auto me-5 mb-5"
      >
        <h3 class="mb-3">
          <span
            class="bg-light text-decoration-underline link-underline-primary"
            >Lo</span>gin
        </h3>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="Enter your email "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-lock"></i
          ><input
            type="password"
            placeholder="Enter a password"
            class="border-0 bg-light w-100"
            style="outline: none"
          /><i class="bi bi-eye"></i>
        </div>
        <div
          class="d-flex align-items-center justify-content-between gap-5 w-100"
        >   
          <div class="d-flex align-items-center gap-2">
            <input type="checkbox" /><span>Remember me</span>
          </div>
          <div class="text-primary">
            <a class="text-decoration-none" href="">Forgot password?</a>
          </div>
        </div>
        <div class="d-flex align-items-center justify-content-center w-100">
          <button class="bg-primary border rounded-2 w-100 text-light p-2">
            Login now
          </button>
        </div>
        <div class="d-flex gap-1 justify-content-center mb-3">
          <span>Don't have an account? </span>
          <a class="text-decoration-none" href=""> Signup now</a>
        </div>
      </div>
      <!-- register -->
      <div
        class="bg-light d-grid gap-4 p-4 align-items-center justify-content-center rounded-3 w-auto mb-5"
      >
        <h3 class="mb-3">
          <span
            class="bg-light text-decoration-underline link-underline-primary"
            >Re</span
          >gistration
        </h3>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-person"></i>
          <input
            type="text"
            placeholder="Enter your name "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-envelope"></i>
          <input
            type="email"
            placeholder="Enter your email "
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-2 align-items-center border-bottom border-2 w-100"
        >
          <i class="bi bi-lock"></i
          ><input
            type="password"
            placeholder="Create a password"
            class="border-0 bg-light w-100"
            style="outline: none"
          />
        </div>
        <div
          class="d-flex gap-5 align-items-center border-bottom border-2 w-100"
        >
          <div class="d-flex gap-2">
            <i class="bi bi-lock"></i
            ><input
              type="password"
              placeholder="Confirm a password"
              class="border-0 bg-light w-100 pe-5"
              style="outline: none"
            />
          </div>
          <i class="bi bi-eye"></i>
        </div>
        <div
          class="d-flex align-items-center justify-content-between gap-5 w-100"
        >
          <div class="d-flex align-items-center gap-2">
            <input type="checkbox" /><span
              >i accept all terms and conditions</span
            >
          </div>
        </div>
        <div class="d-flex align-items-center justify-content-center">
          <button class="bg-primary border rounded-2 w-100 text-light p-2">
            Register now
          </button>
        </div>
        <div class="d-flex gap-1 justify-content-center mb-3">
          <span>already have an account? </span>
          <a class="text-decoration-none" href=""> Login now</a>
        </div>
      </div>
    </div>
    <!-- bootstrap Strap = Remember to always written above the comment -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
