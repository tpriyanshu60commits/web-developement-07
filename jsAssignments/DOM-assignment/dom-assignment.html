<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="dom-assignment.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <form class="d-flex justify-content-center mt-5">
      <div class="w-50">
        <input
          id="input1"
          type="text"
          placeholder="enter your name"
          class="form-control mb-3"
        />
        <input
          id="input2"
          type="text"
          placeholder="enter your city"
          class="form-control mb-3"
        />
      </div>
    </form>
    <button onclick="changes()" class="btn btn-primary d-block mx-auto">
      submit
    </button>

    <div class="d-flex justify-content-center">
      <div id="resultBox"  class="container border border-3 rounded shadow p-2 w-50 mt-5 d-none">
        <div>
          <span id="mydata">Name : </span>
          <br />
          <span id="mydata1">City : </span>
        </div>
      </div>
    </div>

    <!-- Bootstrap link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="dom-assignment.js"></script>
  </body>
</html>
