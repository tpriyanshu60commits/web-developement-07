<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="ageCalculator.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <form>
      <div class="container">
        <div class="upper">Tip calculator</div>
        <div class="lower">
          <div id="firstInput">
            <label for="BillAmount" class="mb-2">Bill Amount</label>
            <div class="d-flex flex-row">
              <input
                type="number"
                name="BillAmount"
                id="BillAmount"
                class="form-control"
              />
              <i class="bi bi-currency-rupee mt-1 mx-2"></i>
            </div>
          </div>
          <div class="secondInput d-flex flex-column">
            <label for="service" class="mb-2">How was the service ?</label>
            <select id="service" class="form-control">
              <option value="25">25% - Top Notch</option>
              <option value="20">20% - Excellent</option>
              <option value="15">15% - Good</option>
              <option value="10">10% - Bad</option>
              <option value="5">5% - Worst</option>
            </select>
            <i class="bi bi-chevron-down"></i>
          </div>
          <div class="thirdInput d-flex flex-column gap-2">
            <label for="totalNumberofPerson">Total Number of Person</label>
            <input type="number" class="form-control"  id="totalNumberofPerson"/>
          </div>
          <button class="btn btn-primary w-50 p-3 fs-5">Calculate</button>

          <div
            id="answer"
            class="d-flex justify-content-center align-items-center flex-column"
          >
            <p>Tip Amount</p>
            <div class="d-flex gap-0"> 
                <span id="dataTip" ></span>  <i class="bi bi-currency-rupee"></i>each
                <p></p>
            </div>
          </div>
        </div>
      </div>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="ageCalculator.js"></script>
  </body>
</html>
