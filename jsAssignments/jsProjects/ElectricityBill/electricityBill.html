<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="electricityBill.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <form>
      <div class="container">
        <div class="upper">Electricity Bill Calculator</div>
        <div class="lower">
          <div id="firstInput">
            <label for="BillAmount" class="mb-2">Bill Units</label>
            <div >
              <input
                type="number"
                name="BillAmount"
                id="BillAmount"
                class="form-control"
              />
            </div>
          </div>
         
          
          <div class="buttons d-flex gap-3">
            <button class="btn btn-primary w-50 p-3 fs-5" id="calculate">Calculate</button>
            <button class="btn btn-primary w-50 p-3 fs-5" id="reset">Reset</button>
          </div>
          <div
            id="answer"
            class="d-flex justify-content-center align-items-center flex-column"
          >
            <p>Total Bill Amount</p>
            <div class="d-flex gap-0"> 
                <span id="databill" ></span>  <i class="bi bi-currency-rupee"></i>
                <p></p>
            </div>
          </div>
        </div>
      </div>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="electricityBill.js"></script>
  </body>
</html>
