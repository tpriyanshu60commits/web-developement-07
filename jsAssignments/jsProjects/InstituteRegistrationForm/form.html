<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header class="p-3 bg-primary mb-4">
      <h2 class="text-center text-white fw-medium">
        Institute Registration Form
      </h2>
    </header>

    <div class="container shadow rounded-3 p-3">
      <form id="registrationForm" class="p-3 bg-white">
        <!-- personal details -->
        <section
          class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
        >
          <h4 class="text-primary">Personal Details</h4>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="fullName" class="fw-bolder">fullName</label>
            <input
              type="text"
              placeholder="Rahul Kumar"
              class="form-control"x
              id="fullName"
            />
            <span
              class="text-danger small manualError"
              id="fullNameError"
            ></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="email" class="fw-bolder">Email</label>
            <input
              type="email"
              placeholder="rajvardhan@example.com"
              class="form-control"
              id="email"
            />
            <span class="text-danger small manualError" id="emailError"></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="number" class="fw-bolder"> Mobile Number</label>
            <input
              type="number"
              placeholder="9876543210"
              class="form-control"
              id="number"
            />
            <span class="text-danger small manualError" id="numberError"></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="dob" class="fw-bolder">Date of Birth</label>
            <input
              type="date"
              placeholder="2008-04-15"
              class="form-control"
              id="dob"
            />
            <span class="text-danger small manualError" id="dobError"></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <div><label for="gender" class="fw-bolder">Gender</label></div>
            <div class="d-flex align-items-center gap-2">
              <input type="radio" name="gender" value="Male"/>Male
              <input type="radio" name="gender" value="Female" />Female
              <input type="radio" name="gender" value="others" />Others
            </div>
            <span class="text-danger small manualError" id="genderError"></span>
          </div>
        </section>

        <!-- Academic Details -->
        <section>
          <div
            class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
          >
            <h4 class="text-primary">Academic Details</h4>
            <div class="d-flex flex-column justify-content-start gap-2">
              <label for="lastCompletedQualification" class="fw-bolder"
                >Last Completed Qualification</label
              >
              <select id="lastCompletedQualification" class="form-control">
                <option value="">Select Qualification</option>
                <option value="10th">10th</option>
                <option value="12th">12th</option>
                <option value="Graduate">Graduate</option>
                <option value="Postgraduate">Postgraduate</option>
              </select>
              <span
                class="text-danger small manualError"
                id="qualificationError"
              ></span>
            </div>
            <div class="d-flex flex-column justify-content-start gap-2">
              <label for="percentage" class="fw-bolder">percentage</label>
              <input
                type="text"
                placeholder="90% or A"
                class="form-control"
                id="percentage"
              />
              <span
                class="text-danger small manualError"
                id="percentageError"
              ></span>
            </div>
          </div>
        </section>

        <!-- Course Information -->
        <section>
          <div
            class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
          >
            <h4 class="text-primary">Course Information</h4>
            <div class="d-flex flex-column justify-content-start gap-2">
              <label for="preferredCourse" class="fw-bolder"
                >Preferred Course</label
              >
              <select id="preferredCourse" class="form-control">
                <option value="">Select Preferred Course</option>
                <option value="IIT-JEE">IIT-JEE</option>
                <option value="NEET">NEET</option>
                <option value="BankingExams">Banking Exams</option>
                <option value="UPSC">UPSC</option>
              </select>
              <span
                class="text-danger small manualError"
                id="courseError"
              ></span>
            </div>
            <div class="d-flex flex-column gap-2">
              <div>
                <label for="batchTimingPreference" class="fw-bolder"
                  >Batch Timing Preference:</label
                >
              </div>
              <div class="d-flex flex-row gap-2">
                <input
                  type="checkbox"
                  name="batchTiming"
                  value="Morning"
                />Morning
                <input
                  type="checkbox"
                  name="batchTiming"
                  value="Afternoon"
                />Afternoon
                <input
                  type="checkbox"
                  name="batchTiming"
                  value="Evening"
                />Evening
                <input
                  type="checkbox"
                  name="batchTiming"
                  value="Weekend"
                />Weekend
                <span
                  class="text-danger small manualError"
                  id="batchTimingError"
                ></span>
              </div>
            </div>
          </div>
        </section>

        <!-- ADDRESS details -->
        <section
          class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
        >
          <h4 class="text-primary">Address</h4>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="residentialAddress" class="fw-bolder"
              >Residential Address</label
            >
            <input
              type="text"
              placeholder="123, Main Street, Delhi"
              class="form-control"
              id="residentialAddress"
            />
            <span
              class="text-danger small manualError"
              id="addressError"
            ></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="city" class="fw-bolder">City</label>
            <input
              type="text"
              placeholder="Delhi"
              class="form-control"
              id="city"
            />
            <span class="text-danger small manualError" id="cityError"></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="pinCode" class="fw-bolder">Pin Code</label>
            <input
              type="number"
              placeholder="110011"
              class="form-control"
              id="pinCode"
            />
            <span
              class="text-danger small manualError"
              id="pinCodeError"
            ></span>
          </div>
        </section>

        <!-- Guardian’s  details -->
        <section
          class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
        >
          <h4 class="text-primary">Guardian’s details</h4>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="guardiansName" class="fw-bolder"
              >Guardian’s Full Name</label
            >
            <input
              type="text"
              placeholder="Suresh Vardhan"
              class="form-control"
              id="guardiansName"
            />
            <span
              class="text-danger small manualError"
              id="guardianNameError"
            ></span>
          </div>
          <div class="d-flex flex-column justify-content-start gap-2">
            <label for="GuardianContactNumber" class="fw-bolder"
              >Guardian’s Contact Number</label
            >
            <input
              type="number"
              placeholder="9876543211"
              class="form-control"
              id="GuardianContactNumber"
            />
            <span
              class="text-danger small manualError"
              id="guardianPhoneError"
            ></span>
          </div>
        </section>
        <!--Additional Information -->
        <section>
          <div
            class="d-flex flex-column justify-content-start gap-3 border mb-4 p-3"
          >
            <h4 class="text-primary">Additional Information</h4>
            <div class="d-flex flex-column justify-content-start gap-2">
              <label for="hearAboutUs" class="fw-bolder">
                How did you hear about us?</label
              >
              <select id="hearAboutUs" class="form-control">
                <option value="">Select options</option>
                <option value="Friends">Friends</option>
                <option value="Online Ad">Online Ad</option>
                <option value="Social Media">Social Media</option>
                <option value="Other">Other</option>
              </select>
              <span class="text-danger small manualError" id="hearError"></span>
            </div>
            <div class="d-flex flex-column justify-content-start gap-2">
              <label for="specialRequirement" class="fw-bolder"
                >Special Requirements (optional):</label
              >
              <textarea
                name="specialRequirement"
                id="specialRequirement"
                rows="3"
                class="form-control"
              ></textarea>
            </div>
          </div>
        </section>
        <div class="buttons d-flex justify-content-between">
            <button type="reset" class="btn btn-info">reset</button>
            <button type="submit" class="btn btn-primary">submit</button>
        </div>
      </form>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="form.js"></script>
  </body>
</html>
