<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="salary.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <form>
      <div class="Container">
        <header>
          <i class="bi bi-cash-coin"></i>
          <h2>Salary Calculator</h2>
        </header>
        <hr />
        <div class="d-flex flex-column gap-2">
          <label for="BasicSalary" class="fw-bold">Basic Salary (₹)</label>
          <input
            id="BasicSalary"
            type="number"
            name="BasicSalary"
            class="form-control p-2 shadow-none border"
          />
          <p id="BasicSalaryPtag">Enter your basic salary 0 or more</p>
        </div>
        <div class="buttons">
          <button
            class="calculateButton d-flex gap-1 justify-content-center"
            type="button" id="calculateButton"
          >
            <i class="bi bi-calculator-fill"></i>Calculate
          </button>
          <button
            class="ResetButton d-flex gap-1 justify-content-center"
            type="button" id="reset"
          >
            <i class="bi bi-x-diamond-fill"></i>Reset
          </button>
        </div>
        <div class="lower d-none" id="lower">
          <div class="messageSalary">
            <p class="gap-2 d-flex mb-0">
              <i class="bi bi-arrow-right-circle-fill"></i>Salary Calculated
              Successfully!
            </p>
          </div>
          <div class="results ">
            <div class="resultIcon">
              <h6 class="gap-2 d-flex mb-0" style="color: #157416">
                <i class="bi bi-arrow-right-circle-fill"></i>Results
              </h6>
              <hr class="mb-0" />
              <div class="d-flex justify-content-between mt-2 mb-0">
                <p class="mb-0">Basic Salary :</p>
                <span id="basicSalaryData" style="color: #157416"></span>
              </div>
              <div class="d-flex justify-content-between mt-2 mb-0">
                <p class="mb-0">HRA (20%) :</p>
                <span id="HRAData" style="color: #157416"></span>
              </div>
              <div class="d-flex justify-content-between mt-2 mb-0">
                <p class="mb-0">DA (10%) :</p>
                <span id="DAData" style="color: #157416"></span>
              </div>
              <div class="d-flex justify-content-between mt-2 mb-0">
                <p class="mb-0 fw-bolder" style="color: #157416">
                  Gross Salary:
                </p>
                <span id="GrossSalaryData" style="color: #157416"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="salary.js"></script>
  </body>
</html>
