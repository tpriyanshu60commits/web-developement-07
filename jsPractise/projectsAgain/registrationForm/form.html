<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="text-center text-white bg-primary p-3 fs-2 fw-bold">
      Institute Registration Form
    </header>
    <div class="container p-3 shadow mt-4">
      <form class="p-1" id="registrationForm">
        <!-- Personal Information: -->
        <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold">Personal Information:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="fullName" class="fw-medium">Full Name:</label>
            <input
              type="text"
              placeholder="Raj Vardhan"
              class="form-control"
              id="fullName"
            />
            <span class="manualError small text-danger" id="fullNameError"></span>
            <span></span>
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="email" class="fw-medium">Email Address:</label>
            <input
              type="email"
              placeholder="rajvardhan@example.com"
              class="form-control"
              id="email"
            />
            <span class="manualError small text-danger" id="emailError"></span>

          </div>
          <div class="d-flex flex-column gap-2">
            <label for="mobileNumber" class="fw-medium">Mobile Number:</label>
            <input
              type="number"
              placeholder="9876543210"
              class="form-control"
              id="mobileNumber"
            />
            <span class="manualError small text-danger" id="mobineNumberError"></span>
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="dob" class="fw-medium">Date of Birth:</label>
            <input
              type="date"
              placeholder="2008-04-15"
              class="form-control"
              id="dob"
            />
            <span class="manualError small text-danger" id="dateError"></span>
          </div>
          <div class="d-flex flex-column">
            <label for="gender" class="fw-medium mb-2 d-block">Gender:</label>
            <div class="d-flex gap-2">
              <input type="radio" name="gender" value="Male" />Male
              <input type="radio" name="gender" value="Female" />Female
              <input type="radio" name="gender" value="Others" />Others
            </div>
          </div>
        </section>

        <!--Academic Details: -->
        <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold">Academic Details:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="lastCompletedQualification" class="fw-medium"
              >Last Completed Qualification:</label
            >
            <select id="lastCompletedQualification" class="form-control">
              <option value="">Select Qualification</option>
              <option value="10th">10th</option>
              <option value="12th">12th</option>
              <option value="Graduate">Graduate</option>
              <option value="Postgraduate">Postgraduate</option>
            </select>
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="percentage">Percentage/Grade:</label>
            <input
              type="text"
              class="form-control"
              placeholder="85"
              id="percentage"
            />
          </div>
        </section>
        <!-- Course Information:-->
        <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold">Course Information:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="preferredCourse" class="fw-medium"
              >Preferred Course:</label
            >
            <select id="preferredCourse" class="form-control">
              <option value="">Select Preferred Course</option>
              <option value="IIT-JEE">IIT-JEE</option>
              <option value="NEET">NEET</option>
              <option value="BankingExams">Banking Exams,</option>
              <option value="UPSC">UPSC</option>
            </select>
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="batchTiming">Batch Timing Preference:</label>
            <div class="d-flex gap-2 align-items-center">
              <input type="checkbox" value="Morning" id="batchTiming" />Morning
              <input
                type="checkbox"
                value="Afternoon"
                id="batchTiming"
              />Afternoon
              <input type="checkbox" value="Evening" id="batchTiming" />Evening
              <input type="checkbox" value="Weekend" id="batchTiming" />Weekend
            </div>
          </div>
        </section>
        <!-- Address Information:-->
        <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold">Address Information:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="residentialAddress" class="fw-medium"
              >Residential Address:</label
            >
            <input
              type="text"
              placeholder="123, Main Street, Delhi"
              class="form-control"
              id="residentialAddress"
            />
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="city" class="fw-medium">City:</label>
            <input
              type="text"
              placeholder="Delhi"
              class="form-control"
              id="city"
            />
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="pinCode" class="fw-medium">Pin Code:</label>
            <input
              type="number"
              placeholder="110011"
              class="form-control"
              id="pinCode"
            />
          </div>
        </section>

        <!--  Guardian Details Information:-->
         <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold"> Guardian Details:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="guardiansFullName" class="fw-medium">Guardian’s Full Name::</label>
            <input
              type="text"
              placeholder="Suresh Vardhan"
              class="form-control"
              id="guardiansFullName"
            />
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="guardiansContactNumber" class="fw-medium">Guardian’s Contact Number:</label>
            <input
              type="number"
              placeholder="9876543211"
              class="form-control"
              id="guardiansContactNumber"
            />
          </div>      
        </section>
         <!--     Additional Information:-->
         <section class="d-flex flex-column gap-3 border p-3 rounded mb-3">
          <h4 class="text-primary fw-bold">Additional Information:</h4>
          <div class="d-flex flex-column gap-2">
            <label for="hearAboutUs" class="fw-medium"
              >How did you hear about us?:</label
            >
            <select id="hearAboutUs" class="form-control">
              <option value="">Select</option>
              <option value="Friends">Friends</option>
              <option value="OnlineAd">Online Ad</option>
              <option value="Newspaper">Newspaper</option>
              <option value="SocialMedia">Social Media</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="d-flex flex-column gap-2">
            <label for="specialRequirements" class="fw-medium">Special Requirements:</label>
            <textarea name="" id="specialRequirements" rows="3" class="form-control"></textarea>
          </div>      
        </section>
      </form>
    </div>
  </body>
</html>
