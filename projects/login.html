<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>

        body
        {
            background-color: #4A72D8;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            height: 100vh;

        }
        .card
        {
            border-radius: 10px;
        }
    </style>
    
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-end">
            <div class="col-md-4">
             <div class="card p-4">
                <h4 class="fw-bolder mb-5 mt-2">
                    <span class=" border-bottom border-3 border-primary">lo</span>gin
                </h4>
                <div class="border-0 border-bottom border-1 border-black mb-3">
                  <i class="bi bi-envelope opacity-50"></i>  <input type="email" class="p-2 border-0" placeholder="Enter your email">
                </div>

                <div class="d-flex align-items-center border-bottom border-1 border-black mb-3">
                   <i class="bi bi-lock opacity-50"></i> <input type="password" placeholder="Confirm a password" class="p-2 border-0 w-100"><i class="bi bi-eye"></i>
                </div>

                <div class="d-flex justify-content-between">
                    <div class="d-flex gap-2">
                    <input type="checkbox">
                    <span>Remember me</span>
                    </div>
                    <a href="#" class="text-decoration-none">Forgot password?</a>
                </div>

                <button class="mt-4 rounded-2 p-2 bg-primary fw-bolder text-light mb-2">Login now</button>
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <p>Dont have an account?</p><a href="#" class="text-decoration-none">Signup now</a>
                </div>
             </div>
            </div>


            <!-- registration form -->
             <div class="col-md-4">
                <div class="card p-4">
                    <h4 class="mb-5"><span class="border-bottom border-3 border-primary ">Re</span>gistration</h4>
                    <div class="mb-4">
                        <input type="text" placeholder="Enter your name" class="border-0 border-bottom border-dark w-100 p-2">
                    </div>
                    <div class="mb-4">
                        <input type="email" placeholder="Enter your email" class="border-0 border-bottom border-dark w-100 p-2">
                    </div>
                    <div class="mb-4">
                        <input type="password" placeholder="Create a password" class="border-0 border-bottom border-dark w-100 p-2">
                    </div>
                    <div class="mb-4">
                        <input type="email" placeholder="Confirm a password" class="border-0 border-bottom border-dark w-100 p-2">
                    </div>

                    <div class="d-flex gap-2">
                        <input type="checkbox">
                        <span>I accept all terms & conditions</span>
                    </div>

                    <button class="bg-primary text-light p-2 fw-bolder mt-4 rounded">Register now</button>
                    <div class="d-flex justify-content-center mt-2 gap-2">
                        <p>Already have a account?</p> <a href="#" class="text-decoration-none">Login now</a>
                    </div>

                </div>


             </div>
            






           




        </div>
    </div>





















    <!-- Bootstrap link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
</body>
</html>
